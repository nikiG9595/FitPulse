<!doctype html><html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"><head th:replace="~{fragments/head :: head('Class Details')}"></head><body class="page-bg"><div th:replace="~{fragments/nav :: nav}"></div><main class="container page"><div th:if="${success}" class="alert alert-success" th:text="${success}"></div><div th:if="${error}" class="alert alert-danger" th:text="${error}"></div><div class="fit-card detail-card"><span class="badge text-bg-warning" th:text="${gymClass.intensity}"></span><h1 class="mt-3" th:text="${gymClass.title}">Class</h1><p class="lead text-muted" th:text="${gymClass.description}">Description</p><div class="row g-3 my-4"><div class="col-md-3"><strong>Trainer</strong><br><span th:text="${gymClass.trainerName}"></span></div><div class="col-md-3"><strong>Starts</strong><br><span th:text="${#temporals.format(gymClass.startsAt,'dd MMM yyyy HH:mm')}"></span></div><div class="col-md-3"><strong>Capacity</strong><br><span th:text="${bookingsCount} + '/' + ${gymClass.capacity}"></span></div><div class="col-md-3"><strong>Required plan</strong><br><span th:text="${gymClass.requiredMembership.title}"></span></div></div><div class="d-flex gap-2 flex-wrap"><form th:action="@{/classes/{id}/book(id=${gymClass.id})}" method="post"><button class="btn btn-pulse">Book Class</button></form><a sec:authorize="hasRole('ADMIN')" class="btn btn-outline-dark" th:href="@{/classes/{id}/edit(id=${gymClass.id})}">Edit</a><form sec:authorize="hasRole('ADMIN')" th:action="@{/classes/{id}/delete(id=${gymClass.id})}" method="post"><button class="btn btn-outline-danger">Delete</button></form></div></div></main></body></html>
