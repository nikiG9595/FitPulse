<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head('Login')}"></head>
<body class="auth-bg">
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="container auth-page">
    <div class="auth-card"><h1>Welcome back</h1>
        <p class="text-muted">Login to manage your FitPulse schedule.</p>
        <div th:if="${param.error}" class="alert alert-danger">Invalid username or password.</div>
        <div th:if="${param.registered}" class="alert alert-success">Registration successful. You can login now.</div>
        <form method="post" th:action="@{/login}"><label class="form-label">Username</label><input
                class="form-control mb-3" name="username"><label class="form-label">Password</label><input
                class="form-control mb-4" type="password" name="password">
            <button class="btn btn-pulse w-100">Login</button>
        </form>
        <p class="mt-3 mb-0">Don't have account? <a href="/register">Register here</a></p>
        <hr>
</main>
</body>
</html>
