<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head('Register')}"></head>
<body class="auth-bg">
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="container auth-page">
    <div class="auth-card"><h1>Create account</h1>
        <p class="text-muted">Join FitPulse and book your first class.</p>
        <div th:if="${globalError}" class="alert alert-danger" th:text="${globalError}"></div>
        <form th:action="@{/register}" th:object="${registerRequest}" method="post"><label
                class="form-label">Username</label><input class="form-control" th:field="*{username}">
            <div class="field-error" th:errors="*{username}"></div>
            <label class="form-label mt-3">Email</label><input class="form-control" th:field="*{email}">
            <div class="field-error" th:errors="*{email}"></div>
            <label class="form-label mt-3">Password</label><input class="form-control" type="password"
                                                                  th:field="*{password}">
            <div class="field-error" th:errors="*{password}"></div>
            <label class="form-label mt-3">Confirm Password</label><input class="form-control" type="password"
                                                                          th:field="*{confirmPassword}">
            <div class="field-error" th:errors="*{confirmPassword}"></div>
            <button class="btn btn-pulse w-100 mt-4">Register</button>
        </form>
    </div>
</main>
</body>
</html>
