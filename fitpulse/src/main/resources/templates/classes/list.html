<!doctype html><html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"><head th:replace="~{fragments/head :: head('Classes')}"></head><body class="page-bg"><div th:replace="~{fragments/nav :: nav}"></div><main class="container page"><div class="d-flex justify-content-between align-items-center page-title"><div><h1>Workout Classes</h1><p>Find the right session for your goals.</p></div><a sec:authorize="hasRole('ADMIN')" href="/classes/create" class="btn btn-pulse">Create Class</a></div><div class="row g-4"><div class="col-md-6 col-lg-4" th:each="c : ${classes}"><div class="fit-card h-100"><div class="d-flex justify-content-between"><span class="badge text-bg-warning" th:text="${c.intensity}">HIGH</span><span class="small text-muted" th:text="${#temporals.format(c.startsAt,'dd MMM HH:mm')}">date</span></div><h4 class="mt-3" th:text="${c.title}">Title</h4><p class="text-muted" th:text="${c.description}">Description</p><p class="small mb-1">Trainer: <strong th:text="${c.trainerName}"></strong></p><p class="small">Capacity: <strong th:text="${c.capacity}"></strong></p><a class="btn btn-dark w-100" th:href="@{/classes/{id}(id=${c.id})}">Details</a></div></div></div></main></body></html>
