<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head('Dashboard')}"></head>
<body class="page-bg">
<div th:replace="~{fragments/nav :: nav}"></div>

<main class="container page">
    <div class="page-title">
        <h1>Welcome back, <span sec:authentication="name"></span>!</h1>

        <p class="mb-1" th:if="${user.membership != null}">
            Current Plan: <strong th:text="${user.membership.title}">Premium</strong>
        </p>

        <p class="mb-1" th:if="${user.membership == null}">
            Current Plan: <strong>None</strong>
        </p>

        <p>Choose your next workout.</p>
    </div>

    <div class="row g-4">
        <div class="col-md-4" th:each="c : ${classes}">
            <div class="fit-card h-100">
                <h4 th:text="${c.title}">Class</h4>
                <p class="text-muted" th:text="${c.description}">Desc</p>
                <a class="btn btn-pulse w-100"
                   th:href="@{/classes/{id}(id=${c.id})}">Open</a>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
