<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head('Profile')}"></head>
<body class="page-bg">
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="container page">
    <div class="row g-4">
        <div class="col-lg-4">
            <div class="fit-card"><h1 th:text="${user.username}">User</h1>
                <p class="text-muted" th:text="${user.email}"></p>
                <p>Role: <strong th:text="${user.role}"></strong></p>
                <p>Membership: <strong
                        th:text="${user.membership != null ? user.membership.title : 'No active plan'}"></strong></p><a
                        href="/memberships" class="btn btn-pulse w-100">Change Membership</a></div>
        </div>
        <div class="col-lg-8">
            <div class="fit-card"><h2>Recent Bookings</h2>
                <div th:if="${#lists.isEmpty(bookings)}" class="text-muted">You have no bookings yet.</div>
                <div class="booking-row" th:each="b : ${bookings}"><strong th:text="${b.gymClass.title}"></strong><span
                        th:text="${#temporals.format(b.gymClass.startsAt,'dd MMM HH:mm')}"></span></div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
