<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head('Membership Form')}"></head>
<body class="page-bg">
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="container page narrow">
    <div class="fit-card"><h1 th:text="${membershipId} == null ? 'Create Membership' : 'Edit Membership'"></h1>
        <form th:action="${membershipId} == null ? @{/memberships/create} : @{/memberships/{id}/edit(id=${membershipId})}"
              th:object="${membershipRequest}" method="post"><label class="form-label mt-3">Type</label><select
                class="form-select" th:field="*{type}">
            <option value="">Choose...</option>
            <option th:each="t : ${types}" th:value="${t}" th:text="${t}"></option>
        </select>
            <div class="field-error" th:errors="*{type}"></div>
            <label class="form-label mt-3">Title</label><input class="form-control" th:field="*{title}">
            <div class="field-error" th:errors="*{title}"></div>
            <label class="form-label mt-3">Price</label><input class="form-control" type="number" step="0.01"
                                                               th:field="*{price}">
            <div class="field-error" th:errors="*{price}"></div>
            <label class="form-label mt-3">Duration Days</label><input class="form-control" type="number"
                                                                       th:field="*{durationDays}">
            <div class="field-error" th:errors="*{durationDays}"></div>
            <label class="form-label mt-3">Description</label><textarea class="form-control" rows="4"
                                                                        th:field="*{description}"></textarea>
            <div class="field-error" th:errors="*{description}"></div>
            <button class="btn btn-pulse w-100 mt-4">Save</button>
        </form>
    </div>
</main>
</body>
</html>
