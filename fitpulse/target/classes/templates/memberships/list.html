<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head('Memberships')}">

</head>
<body class="page-bg">
<div th:replace="~{fragments/nav :: nav}">

</div>
<main class="container page">
    <div class="d-flex justify-content-between align-items-center page-title">
        <div>
            <h1>Membership Plans</h1>
            <p>Pick the plan that fits your training rhythm.</p>
        </div>
        <a sec:authorize="hasRole('ADMIN')" href="/memberships/create" class="btn btn-pulse">Create Plan</a></div>
    <div class="row g-4">
        <div class="col-md-4" th:each="m : ${memberships}">
            <div class="fit-card plan-card h-100"><span class="badge text-bg-dark" th:text="${m.type}">BASIC</span>
                <h3 class="mt-3" th:text="${m.title}"></h3>
                <div class="price"><span th:text="${m.price}"></span> €</div>
                <p class="text-muted" th:text="${m.description}"></p>
                <p class="small" th:text="${m.durationDays} + ' days'"></p>
                <form th:action="@{/memberships/{id}/choose(id=${m.id})}" method="post">
                    <button class="btn btn-pulse w-100">Choose Membership</button>
                </form>
                <div sec:authorize="hasRole('ADMIN')" class="d-flex gap-2 mt-2"><a class="btn btn-outline-dark w-50"
                                                                                   th:href="@{/memberships/{id}/edit(id=${m.id})}">Edit</a>
                    <form class="w-50" th:action="@{/memberships/{id}/delete(id=${m.id})}" method="post">
                        <button class="btn btn-outline-danger w-100">Delete</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
