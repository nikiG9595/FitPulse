<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head('My Bookings')}"></head>
<body class="page-bg">
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="container page">
    <div class="page-title"><h1>My Workout Bookings</h1>
        <p>Your upcoming booked classes.</p></div>
    <div class="fit-card" th:if="${#lists.isEmpty(bookings)}">No bookings yet. <a href="/classes">Book your first
        class</a>.
    </div>
    <div class="row g-4">
        <div class="col-md-6" th:each="b : ${bookings}">
            <div class="fit-card"><h4 th:text="${b.gymClass.title}"></h4>
                <p class="text-muted" th:text="${b.gymClass.description}"></p>
                <p class="small">Starts: <strong
                        th:text="${#temporals.format(b.gymClass.startsAt,'dd MMM yyyy HH:mm')}"></strong></p>
                <form th:action="@{/bookings/{id}/cancel(id=${b.id})}" method="post">
                    <button class="btn btn-outline-danger">Cancel Booking</button>
                </form>
            </div>
        </div>
    </div>
</main>
</body>
</html>
