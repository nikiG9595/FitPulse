<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head('Class Form')}"></head>
<body class="page-bg">
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="container page narrow">
    <div class="fit-card"><h1 th:text="${classId} == null ? 'Create Class' : 'Edit Class'">Class</h1>
        <form th:action="${classId} == null ? @{/classes/create} : @{/classes/{id}/edit(id=${classId})}"
              th:object="${gymClassRequest}" method="post"><label class="form-label mt-3">Title</label><input
                class="form-control" th:field="*{title}">
            <div class="field-error" th:errors="*{title}"></div>
            <label class="form-label mt-3">Trainer</label><input class="form-control" th:field="*{trainerName}">
            <div class="field-error" th:errors="*{trainerName}"></div>
            <label class="form-label mt-3">Starts At</label><input class="form-control" type="datetime-local"
                                                                   th:field="*{startsAt}">
            <div class="field-error" th:errors="*{startsAt}"></div>
            <label class="form-label mt-3">Capacity</label><input class="form-control" type="number"
                                                                  th:field="*{capacity}">
            <div class="field-error" th:errors="*{capacity}"></div>
            <label class="form-label mt-3">Intensity</label><select class="form-select" th:field="*{intensity}">
                <option value="">Choose...</option>
                <option th:each="i : ${intensities}" th:value="${i}" th:text="${i}"></option>
            </select>
            <div class="field-error" th:errors="*{intensity}"></div>
            <label class="form-label mt-3">Required Membership</label><select class="form-select"
                                                                              th:field="*{requiredMembershipId}">
                <option value="">Choose...</option>
                <option th:each="m : ${memberships}" th:value="${m.id}" th:text="${m.title}"></option>
            </select>
            <div class="field-error" th:errors="*{requiredMembershipId}"></div>
            <label class="form-label mt-3">Description</label><textarea class="form-control" rows="4"
                                                                        th:field="*{description}"></textarea>
            <div class="field-error" th:errors="*{description}"></div>
            <button class="btn btn-pulse w-100 mt-4">Save</button>
        </form>
    </div>
</main>
</body>
</html>
